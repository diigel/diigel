name: Update GitHub Streak Stats

# Trigger: harian, manual, dan kalau workflow diubah
on:
  schedule:
    - cron: "0 3 * * *"       # setiap hari jam 03:00 UTC
  push:
    paths:
      - ".github/workflows/streak.yml"
  workflow_dispatch:           # bisa dijalankan manual di Actions tab

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # perlu untuk commit/push hasil SVG

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate streak SVG
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=blue-navy&hide_border=true
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Commit & push hasil generate
      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
